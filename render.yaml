databases:
  - name: camrecon-db
    plan: free
    databaseName: camrecon
    user: camrecon

services:
  - type: web
    name: camrecon-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx tsc
    startCommand: npx knex migrate:latest --knexfile knexfile.ts && npx knex seed:run --knexfile knexfile.ts && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: camrecon-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        value: sk-your-key-here

  - type: web
    name: camrecon-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npx vite build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://camrecon-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
